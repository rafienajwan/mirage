services:
  web:
    build:
      context: ../apps/web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      MIRAGE_INTERNAL_API_URL: ${MIRAGE_INTERNAL_API_URL:-http://gateway:8000}
      MIRAGE_API_KEY: ${MIRAGE_API_KEY:?MIRAGE_API_KEY is required}
    depends_on:
      gateway:
        condition: service_healthy

  gateway:
    build:
      context: ../apps/gateway
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      MIRAGE_API_KEY: ${MIRAGE_API_KEY:?MIRAGE_API_KEY is required}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-120}
      RISK_THRESHOLD: ${RISK_THRESHOLD:-60}
      ANOMALY_REDIRECT_CONFIDENCE: ${ANOMALY_REDIRECT_CONFIDENCE:-0.5}
      REAL_APP_URL: http://real-app:8001
      DECOY_SERVICE_URL: http://decoy:8002
      PROXY_TIMEOUT_SECONDS: ${PROXY_TIMEOUT_SECONDS:-10}
      PROXY_MAX_BODY_BYTES: ${PROXY_MAX_BODY_BYTES:-1048576}
      DECOY_LOGIN_TOKEN: ${DECOY_LOGIN_TOKEN:?DECOY_LOGIN_TOKEN is required}
      DECOY_OAUTH_TOKEN: ${DECOY_OAUTH_TOKEN:?DECOY_OAUTH_TOKEN is required}
      DECOY_SERVICE_TOKEN: ${DECOY_SERVICE_TOKEN:?DECOY_SERVICE_TOKEN is required}
      DECOY_DATABASE_URL: ${DECOY_DATABASE_URL:?DECOY_DATABASE_URL is required}
    depends_on:
      db:
        condition: service_healthy
      real-app:
        condition: service_healthy
      decoy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 10

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mirage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-mirage}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  real-app:
    build:
      context: ../apps/real-app-demo
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

  decoy:
    build:
      context: ../apps/decoy
    environment:
      DECOY_LOGIN_TOKEN: ${DECOY_LOGIN_TOKEN:?DECOY_LOGIN_TOKEN is required}
      DECOY_OAUTH_TOKEN: ${DECOY_OAUTH_TOKEN:?DECOY_OAUTH_TOKEN is required}
      DECOY_SERVICE_TOKEN: ${DECOY_SERVICE_TOKEN:?DECOY_SERVICE_TOKEN is required}
      DECOY_DATABASE_URL: ${DECOY_DATABASE_URL:?DECOY_DATABASE_URL is required}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
